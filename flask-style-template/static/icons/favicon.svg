<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)" stroke="#4f46e5" stroke-width="1"/>
  
  <!-- Flask icon -->
  <path d="M12 8h8v2h-8z M10 10h12v2h-12z M8 12h16v2h-16z M6 14h20v2h-20z M4 16h24v2h-24z M6 18h20v2h-20z M8 20h16v2h-16z M10 22h12v2h-12z M12 24h8v2h-8z" 
        fill="white" opacity="0.9"/>
  
  <!-- Liquid effect -->
  <path d="M8 16h16v8h-16z" fill="white" opacity="0.3"/>
  
  <!-- Bubbles -->
  <circle cx="12" cy="18" r="1" fill="white" opacity="0.6"/>
  <circle cx="20" cy="20" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="16" cy="22" r="0.6" fill="white" opacity="0.5"/>
  
  <!-- Glow effect -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.3" filter="url(#glow)"/>
</svg> 