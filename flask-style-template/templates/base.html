<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flask App">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- App Icons -->
    <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg">
    <link rel="apple-touch-icon" href="/static/icons/favicon.svg">
    <link rel="mask-icon" href="/static/icons/favicon.svg" color="#6366f1">
    
    <title>{% block title %}Flask App{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-lightning-charge me-2"></i>
                Flask App
            </a>
            
            <div class="navbar-nav ms-auto">
                <!-- Theme Selector -->
                <div class="nav-item dropdown">
                    <select id="theme-selector" class="form-select form-select-sm" style="width: auto;">
                        <option value="dark">🌙 Dark</option>
                        <option value="light">☀️ Light</option>
                        <option value="liquid-glass">💎 Liquid Glass</option>
                        <option value="auto">🔄 Auto</option>
                    </select>
                </div>
                
                <!-- User Menu -->
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar-container expanded" id="sidebar-container">
            <nav class="sidebar">
                <div class="sidebar-header p-3">
                    <h6 class="text-muted mb-0">Navigation</h6>
                </div>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/" data-title="Dashboard">
                            <i class="bi bi-house"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/messages" data-title="Messages">
                            <i class="bi bi-chat"></i>
                            <span>Messages</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/channels" data-title="Channels">
                            <i class="bi bi-hash"></i>
                            <span>Channels</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/feed" data-title="Social Feed">
                            <i class="bi bi-rss"></i>
                            <span>Social Feed</span>
                        </a>
                    </li>
                </ul>
                
                <div class="sidebar-divider my-3"></div>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/profile" data-title="Profile">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings" data-title="Settings">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Sidebar Toggle Button -->
                <div class="sidebar-toggle-container">
                    <button class="btn btn-outline-primary sidebar-toggle" id="sidebar-toggle" type="button">
                        <i class="bi bi-list"></i>
                    </button>
                </div>

                <!-- Page Content -->
                <div class="page-content">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/themes.js') }}"></script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
